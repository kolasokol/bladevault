appId: com.bladevault.desktop
productName: BladeVault
asar: true
asarUnpack:
  - .next/standalone/**/*
  - node_modules/**/*.node
  - node_modules/better-sqlite3/**/*
artifactName: BladeVault-${version}-${os}-${arch}.${ext}
directories:
  output: dist/desktop
  buildResources: build
files:
  - package.json
  - electron/**/*
  - .next/standalone/**/*
mac:
  category: public.app-category.utilities
  target:
    - dmg
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
