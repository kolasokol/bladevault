name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read package version
        id: package
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if [ -z "$version" ]; then
            echo "::error::Failed to read version from package.json"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          expected_tag="v${VERSION}"
          if [ "$TAG" != "$expected_tag" ]; then
            echo "::error title=Tag/version mismatch::Tag '$TAG' does not match package.json version '$VERSION'. Expected '$expected_tag'."
            exit 1
          fi

      - name: Build release notes
        id: notes
        env:
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          current_tag="$TAG"
          previous_tag="$(git describe --tags --abbrev=0 "${current_tag}^" 2>/dev/null || true)"
          notes_file="$RUNNER_TEMP/release-notes.md"
          commits_file="$RUNNER_TEMP/release-commits.txt"

          if [ -n "$previous_tag" ]; then
            git log "${previous_tag}..${current_tag}" --reverse --no-merges --pretty=format:'%s%x09%H%x09%h' > "$commits_file"
          else
            git log "${current_tag}" --reverse --no-merges --pretty=format:'%s%x09%H%x09%h' > "$commits_file"
          fi

          {
            echo "## What's Changed"
            echo

            found_commit=0
            while IFS=$'\t' read -r subject sha short_sha; do
              if printf '%s\n' "$subject" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
                continue
              fi

              found_commit=1
              printf -- '- %s ([%s](https://github.com/%s/commit/%s))\n' "$subject" "$short_sha" "$REPOSITORY" "$sha"
            done < "$commits_file"

            if [ "$found_commit" -eq 0 ]; then
              echo "- No commit summaries were found for this release."
            fi

            if [ -n "$previous_tag" ]; then
              echo
              echo "Full Changelog: [${previous_tag}...${current_tag}](https://github.com/${REPOSITORY}/compare/${previous_tag}...${current_tag})"
            fi
          } > "$notes_file"

          echo "path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
