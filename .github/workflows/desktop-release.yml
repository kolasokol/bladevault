name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: npm run dist:desktop

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/desktop/*.dmg
            dist/desktop/*.exe
            dist/desktop/latest*.yml
            dist/desktop/latest*.yaml
          generate_release_notes: true
