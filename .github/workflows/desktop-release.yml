name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Detect macOS signing credentials
        if: runner.os == 'macOS'
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -n "$APPLE_SIGNING_CERTIFICATE_BASE64" ] && [ -n "$APPLE_SIGNING_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "BLADEVAULT_MAC_SIGN=1" >> "$GITHUB_ENV"
            echo "BLADEVAULT_MAC_NOTARIZE=1" >> "$GITHUB_ENV"
            echo "BLADEVAULT_MAC_RELEASE_KIND=signed" >> "$GITHUB_ENV"
          else
            echo "BLADEVAULT_MAC_SIGN=0" >> "$GITHUB_ENV"
            echo "BLADEVAULT_MAC_NOTARIZE=0" >> "$GITHUB_ENV"
            echo "BLADEVAULT_MAC_RELEASE_KIND=unsigned" >> "$GITHUB_ENV"
          fi

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.BLADEVAULT_MAC_SIGN == '1'
        env:
          APPLE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/bladevault-macos-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/bladevault-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          CERT_PATH="$CERT_PATH" APPLE_SIGNING_CERTIFICATE_BASE64="$APPLE_SIGNING_CERTIFICATE_BASE64" node -e "require('fs').writeFileSync(process.env.CERT_PATH, Buffer.from(process.env.APPLE_SIGNING_CERTIFICATE_BASE64, 'base64'))"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_SIGNING_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          EXISTING_KEYCHAINS=$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

      - name: Build desktop app
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:desktop

      - name: Verify macOS desktop app
        if: runner.os == 'macOS'
        run: npm run verify:desktop:mac

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/desktop/*.dmg
            dist/desktop/*.exe
            dist/desktop/latest*.yml
            dist/desktop/latest*.yaml
